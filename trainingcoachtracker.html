<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="IM Trainer">
<style>
  :root {
    --ac:#2cc4c9; --ac-dark:#1a9fa4; --ac-mid:#5dd4d8;
    --ac-bg:#e8f9fa; --ac-text:#0e6b6e; --ac-deep:#2cc4c9;
    --exp-bg:#f2fbfb;
    --glass-bg: rgba(255, 255, 255, 0.95);
    --hdr-h: 60px; /* Feste Header-Höhe */
  }
  
  *{box-sizing:border-box;margin:0;padding:0;}
  
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background:#ffffff;
    color:#111111;
    min-height: 100vh;
    /* Verhindert Rubber-Banding beim Scrollen in der Web-App teilweise */
    overflow-x: hidden;
  }

  /* ── Layout Fix ── */
  .app {
    max-width: 420px;
    margin: 0 auto;
    /* Das Padding-Top sorgt dafür, dass der Inhalt NIEMALS hinter den Header rutscht */
    padding: calc(var(--hdr-h) + env(safe-area-inset-top)) 0 calc(90px + env(safe-area-inset-bottom));
  }

  /* ── Fixed Header ── */
  .header {
    position: fixed;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    height: calc(var(--hdr-h) + env(safe-area-inset-top));
    background: var(--glass-bg);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-bottom: 0.5px solid rgba(0,0,0,0.1);
    z-index: 9999;
    display: flex;
    align-items: flex-end; /* Inhalt am unteren Rand des Headers ausrichten (wegen Notch) */
    padding: 0 16px 10px;
  }
  
  .hdr-im { width:32px; height:32px; border-radius:8px; background:var(--ac-deep); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:white; flex-shrink:0; }
  .hdr-text { margin-left: 12px; }
  .hdr-title { font-size:17px; font-weight:700; line-height: 1.2; }
  .hdr-sub { font-size:11px; color: #666; }

  .save-dot { width:8px; height:8px; border-radius:50%; background:var(--ac); margin-left:auto; opacity:0; transition:opacity .3s; margin-bottom: 5px;}
  .save-dot.show { opacity:1; }

  /* Content Styling */
  .sec { padding: 16px 12px 0; }
  .card { background:#fff; border:0.5px solid #e0e0e0; border-radius:16px; padding:16px; margin-bottom:12px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
  .cd-row { display:flex; justify-content:space-between; align-items:center; }
  .cd-days { font-size:32px; font-weight:800; color:var(--ac-dark); }
  .cd-suf { font-size:12px; color:#666; }
  
  .training-name { font-size:16px; font-weight:600; margin-bottom:6px; }
  .badge { font-size:11px; padding:4px 10px; border-radius:20px; background:var(--ac-bg); color:var(--ac-dark); font-weight:500; margin-right: 5px;}
  
  .done-btn { width:100%; padding:14px; border-radius:12px; border:1px solid #eee; background:#fff; font-size:14px; font-weight:600; cursor:pointer; margin-top: 10px;}
  .done-btn.ok { background:var(--ac-bg); border-color:var(--ac-mid); color:var(--ac-text); }

  .ta { width:100%; margin-top:12px; padding:12px; border:1px solid #eee; border-radius:12px; background:#f9f9f9; font-size:14px; font-family:inherit; resize:none; }

  /* ── Tab Navigation ── */
  .nav-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 420px;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-top: 0.5px solid rgba(0,0,0,0.1);
    display: flex;
    z-index: 9999;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-i { flex:1; padding:12px 0 8px; text-align:center; cursor:pointer; border:none; background:none; color:#999; font-size:10px; font-weight:500; }
  .nav-i.active { color:var(--ac-deep); }
  .nav-ic { font-size:20px; margin-bottom:2px; }

  /* Plan Items */
  .ti { background:#fff; border:0.5px solid #e0e0e0; border-radius:14px; margin-bottom:8px; overflow:hidden; display: flex; align-items: stretch;}
  .ti-chk { width: 50px; display: flex; align-items: center; justify-content: center; border-right: 0.5px solid #eee; }
  .ti-body { flex: 1; padding: 12px; }
  .ti-date { font-size: 11px; color: #888; }
  .ti-name { font-size: 14px; font-weight: 600; }

  /* Stats */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-card { background:#fff; border:0.5px solid #e0e0e0; border-radius:14px; padding:16px; text-align:center; }
  .stat-n { font-size:24px; font-weight:700; color:var(--ac-dark); }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="hdr-im">IM</div>
    <div class="hdr-text">
      <div class="hdr-title" id="hdr-title">Trainingsplan</div>
      <div class="hdr-sub" id="hdr-date">Lade Daten...</div>
    </div>
    <div class="save-dot" id="save-dot"></div>
  </div>

  <div id="page-home" class="page"><div class="sec" id="home-c"></div></div>
  <div id="page-plan" class="page" style="display:none"><div class="sec" id="plan-c"></div></div>
  <div id="page-stats" class="page" style="display:none"><div class="sec" id="stats-c"></div></div>

  <nav class="nav-bar">
    <button class="nav-i active" onclick="showPage('home',this)"><div class="nav-ic">⊙</div>Heute</button>
    <button class="nav-i" onclick="showPage('plan',this)"><div class="nav-ic">≡</div>Plan</button>
    <button class="nav-i" onclick="showPage('stats',this)"><div class="nav-ic">◎</div>Statistik</button>
  </nav>
</div>

<script>
// (Hier stehen deine TR Daten und die Logik wie zuvor)
const RACE=new Date(2026,7,30);
const STORE_KEY='im703-v2';
const TR=[
  {id:'w1_mo',w:1,date:'27.04.',name:"45' Kraft & Core (Zuhause)",focus:'Stabilität',ern:'HP / LC'},
  {id:'w1_di',w:1,date:'28.04.',name:'10km GA1 Lauf',focus:'Ausdauer',ern:'HP / Mixed'},
  // ... (gekürzt, füge hier den Rest deiner Liste ein)
  {id:'race',w:19,date:'30.08.',name:'IRONMAN 70.3 ZELL AM SEE',focus:'FINISH',ern:'RACE'}
];

let state = JSON.parse(localStorage.getItem(STORE_KEY)) || {};

function showPage(page, el) {
  // 1. Alle Seiten ausblenden
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  
  // 2. Gewünschte Seite einblenden
  document.getElementById('page-' + page).style.display = 'block';
  
  // 3. Navigation stylen
  document.querySelectorAll('.nav-i').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  
  // 4. FIX: Scroll-Position zurücksetzen
  window.scrollTo(0, 0); 
  
  // 5. Seite rendern
  if(page === 'home') renderHome();
  if(page === 'plan') renderPlan();
  if(page === 'stats') renderStats();
}

function renderHome() {
  const d = new Date();
  const days = Math.ceil((RACE - d) / 86400000);
  document.getElementById('hdr-date').textContent = "Countdown: " + days + " Tage";
  
  let html = `
    <div class="card cd-row">
      <div>
        <div style="font-size:12px;color:#888">Ziel-Event</div>
        <div style="font-size:18px;font-weight:700">Zell am See 70.3</div>
      </div>
      <div style="text-align:right">
        <div class="cd-days">${days}</div>
        <div class="cd-suf">Tage</div>
      </div>
    </div>
    <div class="card">
      <div class="training-name">Heutiges Training</div>
      <div class="badge">GA1</div><div class="badge">Laufen</div>
      <button class="done-btn" onclick="alert('Erledigt!')">Als erledigt markieren</button>
      <textarea class="ta" rows="3" placeholder="Notizen..."></textarea>
    </div>
  `;
  document.getElementById('home-c').innerHTML = html;
}

function renderPlan() {
  let html = '<h3>Trainingsübersicht</h3><br>';
  TR.forEach(t => {
    html += `
      <div class="ti">
        <div class="ti-chk">○</div>
        <div class="ti-body">
          <div class="ti-date">${t.date} - Woche ${t.w}</div>
          <div class="ti-name">${t.name}</div>
        </div>
      </div>
    `;
  });
  document.getElementById('plan-c').innerHTML = html;
}

function renderStats() {
  document.getElementById('stats-c').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-n">12</div><div class="stat-l">Trainings</div></div>
      <div class="stat-card"><div class="stat-n">85%</div><div class="stat-l">Quote</div></div>
    </div>
    <div class="card" style="margin-top:15px">
      <p>Hier erscheint die Auswertung deiner Einheiten.</p>
    </div>
  `;
}

// Initialer Aufruf
renderHome();
</script>

</body>
</html>
