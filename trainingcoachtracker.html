<style>
  :root {
    --ac:#2cc4c9; --ac-dark:#1a9fa4; --ac-mid:#5dd4d8;
    --ac-bg:#e8f9fa; --ac-text:#0e6b6e; --ac-deep:#2cc4c9;
    --exp-bg:#f2fbfb;
    --glass-bg: rgba(255, 255, 255, 0.85);
    --nav-sh:0 -2px 20px rgba(0,0,0,0.08);
    --header-height: 60px;
  }
  
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family: system-ui, -apple-system, sans-serif;
    background:#ffffff;
    color:#111111;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
  }

  .app {
    max-width: 420px;
    margin: 0 auto;
    padding: var(--header-height) 0 90px;
  }

  .header{
    position: fixed;
    top: 0;
    width: 100%;
    max-width: 420px;
    height: var(--header-height);
    background: var(--glass-bg);
    backdrop-filter: blur(20px) saturate(180%);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    border-bottom: .5px solid rgba(0,0,0,0.1);
    z-index: 1000;
    display: flex;
    align-items: center;
    padding: 0 16px;
    left: 50%;
    transform: translateX(-50%);
  }
  
  .hdr-im{width:32px;height:32px;border-radius:8px;background:var(--ac-deep);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:white;flex-shrink:0;}
  .hdr-title{font-size:17px;font-weight:600;margin-left:12px;}
  .hdr-sub{font-size:11px;color: #666; margin-left: 12px;}
  .save-dot{width:7px;height:7px;border-radius:50%;background:var(--ac);margin-left:auto;opacity:0;transition:opacity .3s;}
  .save-dot.show{opacity:1;}

  .sec{ padding: 16px 12px 0; }
  .card{background:#fff;border:.5px solid #e0e0e0;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow: 0 2px 8px rgba(0,0,0,0.02);}
  .cd-row{display:flex;justify-content:space-between;align-items:center;}
  .cd-days{font-size:32px;font-weight:700;color:var(--ac-dark);line-height:1;}
  .cd-suf{font-size:12px;color:#666;}
  .section-label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;}
  .training-name{font-size:16px;font-weight:600;line-height:1.4;margin-bottom:6px;}
  .training-name.sm{font-size:14px;margin-bottom:4px;}
  .meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
  .badge{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--ac-bg);color:var(--ac-dark);font-weight:500;}
  .badge-gray{background:#f0f0f0;color:#666;}

  /* Button Group für Home & Plan */
  .btn-group { display: flex; gap: 8px; margin-bottom: 12px; }
  .done-btn{flex: 2; padding:12px;border-radius:12px;border:1px solid #eee;background:#fff;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;}
  .done-btn.ok{background:var(--ac-bg);border-color:var(--ac-mid);color:var(--ac-text);}
  .skip-btn{flex: 1; padding:12px;border-radius:12px;border:1px solid #eee;background:#fff;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#888;transition:all .2s;}
  .skip-btn.active{background:#f0f0f0;border-color:#ccc;color:#444;}

  .ci{width:20px;height:20px;border:1.5px solid currentColor;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ci.ok{background:var(--ac-deep);border-color:var(--ac-deep);}
  .ci svg{display:none;}.ci.ok svg{display:block;}
  .ta{width:100%;margin-top:12px;padding:12px;border:1px solid #eee;border-radius:12px;background:#f9f9f9;font-size:14px;font-family:inherit;resize:none;}
  .tmr-label{font-size:11px;color:#888;text-transform:uppercase;margin-bottom:6px;display:block;}
  
  /* Plan Status */
  .ti{background:#fff;border:.5px solid #e0e0e0;border-radius:14px;margin-bottom:8px;overflow:hidden;}
  .ti.today-i{border-color:var(--ac-mid);border-width:1.5px;}
  .ti.done-i{opacity:.6;}
  .ti.skipped-i{opacity:.6; background:#fafafa;}
  .ti-row{display:flex;align-items:center;}
  .ti-chk{flex-shrink:0;width:50px;display:flex;align-items:center;justify-content:center;padding:16px 0;cursor:pointer;background:none;border:none;border-right:.5px solid #eee;align-self:stretch;}
  .ti-chk.skipped-i { color: #ccc; }
  .ti-body{flex:1;padding:12px;min-width:0;}
  .ti-date{font-size:11px;color:#888;margin-bottom:2px;}
  .ti-name{font-size:14px;font-weight:600;line-height:1.3;}
  .ti-chv{padding:16px;color:#ccc;font-size:12px;}
  .ti-exp{display:none;background:var(--exp-bg);border-top:.5px solid #eee;padding:12px 12px 12px 50px;}
  .ti-exp.open{display:block;}
  .exp-ta{width:100%;padding:10px;border:1px solid var(--ac-mid);border-radius:8px;background:#fff;font-size:13px;resize:none;margin-top:8px;}

  /* Stats */
  .stat-row{display:flex;gap:10px;margin-bottom:10px;}
  .stat-card{flex:1;background:#fff;border:.5px solid #e0e0e0;border-radius:14px;padding:16px;text-align:center;}
  .stat-n{font-size:24px;font-weight:700;color:var(--ac-dark);}
  .stat-l{font-size:11px;color:#888;margin-top:4px;}
  .exp-btn{width:100%;padding:14px;margin-top:12px;border-radius:12px;border:1px solid #eee;background:#fff;font-size:14px;font-weight:600;color:#444;}

  .nav-bar{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:.5px solid rgba(0,0,0,0.1);
    display:flex;z-index:1000;padding-bottom: env(safe-area-inset-bottom);
  }
  .nav-i{flex:1;padding:12px 0 8px;text-align:center;cursor:pointer;border:none;background:none;color:#999;font-size:10px;font-weight:500;}
  .nav-i.active{color:var(--ac-deep);}
  .nav-ic{font-size:20px;margin-bottom:2px;}

  .empty{text-align:center;padding:40px 20px;color:#999;background:#f9f9f9;border-radius:16px;border:1px dashed #ddd;}
</style>
</head>

  {id:'w16_di',w:16,date:'11.08.',name:'2.000m Swim (Race Pace)',focus:'Rhythmus',ern:'HP / Mixed'},
  {id:'w16_sa',w:16,date:'15.08.',name:"2,5h Rad (inkl. 3x10' Race Pace)",focus:'Tapering',ern:'HP / Mixed'},
  {id:'w16_so',w:16,date:'16.08.',name:'15-18km Lauf (oder Recovery Swim)',focus:'Ausdauer-Peak',ern:'HP / HC'},
  {id:'w17_sa',w:17,date:'22.08.',name:"90' Rad + 5km Lauf (Race Pace)",focus:'Spannung',ern:'HP / Mixed'},
  {id:'w18_mi',w:18,date:'26.08.',name:"45' Rad (Aktivierung)",focus:'Spritzigkeit',ern:'HP / HC'},
  {id:'w18_fr',w:18,date:'28.08.',name:"20' Einschwimmen in Zell am See",focus:'Orientierung',ern:'HC Load'},
  {id:'race',w:19,date:'30.08.',name:'IRONMAN 70.3 ZELL AM SEE',focus:'FINISH < 5h',ern:'RACE FUEL'},
];
TR.forEach(t=>{t.dateObj=parseDate(t.date);});

let db=null;
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=e=>e.target.result.createObjectStore(DB_STORE);r.onsuccess=e=>{db=e.target.result;res(db);};r.onerror=rej;});}
async function dbGet(){try{await openDB();return new Promise((res,rej)=>{const r=db.transaction(DB_STORE,'readonly').objectStore(DB_STORE).get(DB_KEY);r.onsuccess=()=>res(r.result||null);r.onerror=rej;});}catch{return null;}}
async function dbSet(v){try{await openDB();return new Promise((res,rej)=>{const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).put(v,DB_KEY);tx.oncomplete=res;tx.onerror=rej;});}catch{}}

let state={},currentPage='home',openExpand=null,saveTimer=null;

async function loadState(){
  let d=null;
  try{d=await dbGet();}catch{}
  if(!d){try{const r=await window.storage.get(STORE_KEY);if(r?.value)d=JSON.parse(r.value);}catch{}}
  if(d)state=d;
  renderAll();
}

async function persistState(){
  const dot=document.getElementById('save-dot');
  dot.classList.add('show');
  try{await dbSet(state);}catch{}
  try{await window.storage.set(STORE_KEY,JSON.stringify(state));}catch{}
  setTimeout(()=>dot.classList.remove('show'),1200);
}

function schedSave(){clearTimeout(saveTimer);saveTimer=setTimeout(persistState,350);}

function findTr(d){const t=d.getTime();return TR.find(r=>r.dateObj&&r.dateObj.getTime()===t)||null;}
function ckSVG(){return`<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;}

function showPage(page,el){
  currentPage=page;
  window.scrollTo(0, 0);
  document.querySelectorAll('.page').forEach(p=>p.style.display='none');
  document.getElementById('page-'+page).style.display='block';
  document.querySelectorAll('.nav-i').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  if(page==='home')renderHome();
  if(page==='plan'){renderPlan();scrollToToday();}
  if(page==='stats')renderStats();
}

function renderAll(){renderHome();}

function toggleStatus(id, type, from) {
  if(!state[id]) state[id] = {};
  if(type === 'done') {
    state[id].done = !state[id].done;
    if(state[id].done) state[id].skipped = false;
  } else if(type === 'skipped') {
    state[id].skipped = !state[id].skipped;
    if(state[id].skipped) state[id].done = false;
  }
  persistState();
  if(from === 'home') renderHome(); else renderPlan();
  if(currentPage === 'stats') renderStats();
}

function renderHome(){
  const todT=findTr(today()),tmrT=findTr(tomorrow());
  document.getElementById('hdr-date').textContent = todT ? `Woche ${todT.w}` : fmt(today());
  const days=Math.ceil((RACE-today())/86400000);
  const sT=todT?(state[todT.id]||{}):{};

  let html=`<div class="card cd-row">
    <div>
      <div style="font-size:12px;color:#888;margin-bottom:4px">Ironman 70.3</div>
      <div style="font-size:16px;font-weight:700">Zell am See</div>
      <div style="font-size:11px;color:#888;margin-top:2px">30. August 2026</div>
    </div>
    <div style="text-align:right">
      <div class="cd-days">${Math.max(0,days)}</div>
      <div class="cd-suf">${days===1?'Tag':'Tage'}</div>
    </div>
  </div>`;

  if(todT){
    const done=sT.done, skipped=sT.skipped;
    html+=`<div class="card">
      <div class="section-label">Heute · Woche ${todT.w}</div>
      <div class="training-name">${todT.name}</div>
      <div class="meta"><span class="badge">${todT.focus}</span><span class="badge badge-gray">${todT.ern}</span></div>
      
      <div class="btn-group">
        <button class="done-btn ${done?'ok':''}" onclick="toggleStatus('${todT.id}','done','home')">
          <div class="ci ${done?'ok':''}">${done?ckSVG():''}</div>${done?'Erledigt!':'Erledigt'}
        </button>
        <button class="skip-btn ${skipped?'active':''}" onclick="toggleStatus('${todT.id}','skipped','home')">
          ${skipped?'Übersprungen':'Skip'}
        </button>
      </div>

      <textarea class="ta" rows="3" placeholder="Notizen: Abweichungen, Befinden..." oninput="noteChange('${todT.id}',this.value)">${sT.note||''}</textarea>
    </div>`;
  } else {
    html+=`<div class="empty">Kein Training heute.<br><span style="font-size:12px">Erholungstag!</span></div>`;
  }
  if(tmrT){
    html+=`<div class="card" style="opacity:.82">
      <div class="tmr-label">Morgen · Woche ${tmrT.w}</div>
      <div class="training-name sm">${tmrT.name}</div>
      <div class="meta sm"><span class="badge">${tmrT.focus}</span><span class="badge badge-gray">${tmrT.ern}</span></div>
    </div>`;
  }
  document.getElementById('home-c').innerHTML=html;
}

function renderPlan(){
  const todayT=today().getTime();
  let weeks={};TR.forEach(t=>{if(!weeks[t.w])weeks[t.w]=[];weeks[t.w].push(t);});
  let html='';
  Object.keys(weeks).sort((a,b)=>+a-+b).forEach(w=>{
    html+=`<div class="wk-hdr" id="wk-${w}">Woche ${w}</div>`;
    weeks[w].forEach(t=>{
      const s=state[t.id]||{};
      const isToday=t.dateObj&&t.dateObj.getTime()===todayT;
      const isOpen=openExpand===t.id;
      const statusClass = s.done ? 'done-i' : (s.skipped ? 'skipped-i' : '');

      html+=`<div class="ti ${statusClass} ${isToday?'today-i':''}" id="tr-${t.id}">
        <div class="ti-row">
          <button class="ti-chk ${s.skipped?'skipped-i':''}" onclick="toggleStatus('${t.id}','done','plan')">
            <div class="ci ${s.done?'ok':''}">${s.done?ckSVG():(s.skipped?'—':'')}</div>
          </button>
          <div class="ti-body" onclick="toggleExp('${t.id}')">
            <div class="ti-date">${fmt(t.dateObj)||t.date}${isToday?' · <b>Heute</b>':''} ${s.skipped?'(Übersprungen)':''}</div>
            <div class="ti-name">${t.name}</div>
            ${s.note&&!isOpen?`<div class="ti-np" style="font-size:11px;color:#888;margin-top:4px">${s.note}</div>`:''}
          </div>
          <div class="ti-chv" onclick="toggleExp('${t.id}')">${isOpen?'▲':'▼'}</div>
        </div>
        <div class="ti-exp ${isOpen?'open':''}" id="exp-${t.id}">
          <div class="exp-badges" style="display:flex;gap:6px;margin-bottom:10px;"><span class="badge">${t.focus}</span><span class="badge badge-gray">${t.ern}</span></div>
          <div class="btn-group" style="margin-bottom:0">
            <button class="skip-btn ${s.skipped?'active':''}" style="flex:none; width:100%" onclick="toggleStatus('${t.id}','skipped','plan')">
              ${s.skipped ? 'Wieder einplanen' : 'Training überspringen'}
            </button>
          </div>
          <textarea class="exp-ta" rows="3" placeholder="Notizen..." oninput="noteChange('${t.id}',this.value)">${s.note||''}</textarea>
        </div>
      </div>`;
    });
  });
  document.getElementById('plan-c').innerHTML=html;
}

function scrollToToday(){
  setTimeout(()=>{
    const todayT=today().getTime();
    const todTr=TR.find(t=>t.dateObj&&t.dateObj.getTime()===todayT);
    let el=null;
    if(todTr) el=document.getElementById('wk-'+todTr.w);
    if(!el){
      const up=TR.find(t=>t.dateObj&&t.dateObj.getTime()>=todayT);
      if(up) el=document.getElementById('wk-'+up.w);
    }
    if(!el) return;
    const offset = 70; 
    const bodyRect = document.body.getBoundingClientRect().top;
    const elementRect = el.getBoundingClientRect().top;
    window.scrollTo({ top: (elementRect - bodyRect) - offset, behavior: 'smooth' });
  },150);
}

function toggleExp(id){
  openExpand=openExpand===id?null:id;
  renderPlan();
}

function noteChange(id,val){
  if(!state[id])state[id]={};
  state[id].note=val;schedSave();
}

function renderStats(){
  const done=TR.filter(t=>state[t.id]?.done).length;
  const skipped=TR.filter(t=>state[t.id]?.skipped).length;
  const total=TR.length;
  
  document.getElementById('stats-c').innerHTML=`
    <div class="stat-row">
      <div class="stat-card"><div class="stat-n">${done}</div><div class="stat-l">Erledigt</div></div>
      <div class="stat-card"><div class="stat-n">${skipped}</div><div class="stat-l">Übersprungen</div></div>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-n">${Math.round(done/total*100)}%</div><div class="stat-l">Fortschritt</div></div>
      <div class="stat-card"><div class="stat-n">${TR.filter(t=>state[t.id]?.note).length}</div><div class="stat-l">Notizen</div></div>
    </div>
    <button class="exp-btn" onclick="exportCSV()">↓ &nbsp;Protokoll exportieren (CSV)</button>`;
}

function exportCSV(){
  let csv='Woche,Datum,Training,Fokus,Ernaehrung,Status,Notizen\n';
  TR.forEach(t=>{
    const s=state[t.id]||{};
    const n=(s.note||'').replace(/"/g,'""').replace(/\n/g,' ');
    let status = 'Offen';
    if(s.done) status = 'Erledigt';
    else if(s.skipped) status = 'Uebersprungen';
    
    csv+=`${t.w},"${t.date}","${t.name.replace(/"/g,'""')}","${t.focus}","${t.ern}",${status},"${n}"\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));
  a.download='trainingsprotokoll.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

// Swipe Navigation
let touchStartX = 0, touchEndX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive:true});
document.addEventListener('touchend', e => { touchEndX = e.changedTouches[0].screenX; handleSwipe(); }, {passive:true});

function handleSwipe(){
  const diff = touchEndX - touchStartX;
  if(Math.abs(diff) < 80) return;
  const pages = ['home','plan','stats'];
  const currentIndex = pages.indexOf(currentPage);
  if(diff < 0 && currentIndex < pages.length - 1) showPage(pages[currentIndex + 1], document.querySelectorAll('.nav-i')[currentIndex + 1]);
  if(diff > 0 && currentIndex > 0) showPage(pages[currentIndex - 1], document.querySelectorAll('.nav-i')[currentIndex - 1]);
}

loadState();
</script>
