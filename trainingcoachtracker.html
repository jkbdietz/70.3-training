
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font-sans, system-ui); background: var(--color-background-tertiary); color: var(--color-text-primary); min-height: 100vh; }

  .app { max-width: 420px; margin: 0 auto; padding: 0 0 80px; }

  .header { background: var(--color-background-primary); border-bottom: 0.5px solid var(--color-border-tertiary); padding: 16px 16px 12px; position: sticky; top: 0; z-index: 10; }
  .header-title { font-size: 18px; font-weight: 500; }
  .header-sub { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }

  .tabs { display: flex; gap: 0; background: var(--color-background-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); }
  .tab { flex: 1; padding: 10px; font-size: 13px; text-align: center; cursor: pointer; border: none; background: none; color: var(--color-text-secondary); transition: all 0.15s; }
  .tab.active { color: var(--color-text-primary); font-weight: 500; border-bottom: 2px solid #1D9E75; }

  .section { padding: 12px 12px 0; }

  .countdown-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
  .countdown-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px; }
  .countdown-race { font-size: 15px; font-weight: 500; }
  .countdown-days { font-size: 32px; font-weight: 500; color: #0F6E56; line-height: 1; }
  .countdown-suffix { font-size: 12px; color: var(--color-text-secondary); }

  .today-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 16px; margin-bottom: 10px; }
  .today-label { font-size: 11px; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  .today-training { font-size: 15px; font-weight: 500; line-height: 1.4; margin-bottom: 6px; }
  .today-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; background: #E1F5EE; color: #0F6E56; }
  .badge-gray { background: var(--color-background-secondary); color: var(--color-text-secondary); }
  
  .done-btn { width: 100%; padding: 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: none; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.15s; color: var(--color-text-primary); }
  .done-btn:active { transform: scale(0.98); }
  .done-btn.completed { background: #E1F5EE; border-color: #5DCAA5; color: #085041; }
  .check-icon { width: 18px; height: 18px; border: 1.5px solid currentColor; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .check-icon.filled { background: #1D9E75; border-color: #1D9E75; }
  .check-icon svg { display: none; }
  .check-icon.filled svg { display: block; }

  .notes-area { width: 100%; margin-top: 12px; padding: 10px 12px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); font-size: 14px; color: var(--color-text-primary); font-family: inherit; resize: none; line-height: 1.5; }
  .notes-area:focus { outline: none; border-color: #5DCAA5; }
  .notes-area::placeholder { color: var(--color-text-tertiary); }

  .week-header { font-size: 12px; font-weight: 500; color: var(--color-text-secondary); padding: 14px 0 6px; text-transform: uppercase; letter-spacing: 0.05em; }
  .training-item { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 14px; margin-bottom: 6px; display: flex; gap: 12px; cursor: pointer; transition: all 0.15s; }
  .training-item:active { transform: scale(0.99); }
  .training-item.completed { opacity: 0.65; }
  .training-item.today-item { border-color: #5DCAA5; border-width: 1px; }
  .item-check { flex-shrink: 0; margin-top: 2px; }
  .item-body { flex: 1; min-width: 0; }
  .item-date { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 3px; }
  .item-name { font-size: 14px; font-weight: 500; line-height: 1.3; }
  .item-focus { font-size: 12px; color: var(--color-text-secondary); margin-top: 3px; }
  .item-note { font-size: 12px; color: #0F6E56; margin-top: 4px; background: #E1F5EE; padding: 4px 8px; border-radius: 4px; }
  .item-note-gray { font-size: 12px; color: var(--color-text-secondary); margin-top: 4px; background: var(--color-background-secondary); padding: 4px 8px; border-radius: 4px; }
  
  .detail-panel { position: fixed; bottom: 0; left: 0; right: 0; background: var(--color-background-primary); border-top: 0.5px solid var(--color-border-secondary); padding: 16px; z-index: 20; max-width: 420px; margin: 0 auto; transform: translateY(100%); transition: transform 0.25s ease; }
  .detail-panel.open { transform: translateY(0); }
  .detail-panel-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); z-index: 19; display: none; }
  .detail-panel-overlay.open { display: block; }
  .panel-close { position: absolute; top: 12px; right: 16px; background: none; border: none; font-size: 20px; cursor: pointer; color: var(--color-text-secondary); padding: 4px; }
  .panel-training { font-size: 15px; font-weight: 500; margin: 0 28px 4px 0; line-height: 1.4; }
  .panel-date { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 12px; }

  .export-btn { width: 100%; padding: 12px; margin-top: 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: none; font-size: 14px; cursor: pointer; color: var(--color-text-primary); display: flex; align-items: center; justify-content: center; gap: 8px; }
  .export-btn:active { transform: scale(0.98); background: var(--color-background-secondary); }

  .stat-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .stat-card { flex: 1; background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 12px; text-align: center; }
  .stat-num { font-size: 22px; font-weight: 500; color: #0F6E56; }
  .stat-label { font-size: 11px; color: var(--color-text-secondary); margin-top: 2px; }

  .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; max-width: 420px; margin: 0 auto; background: var(--color-background-primary); border-top: 0.5px solid var(--color-border-tertiary); display: flex; z-index: 15; }
  .nav-item { flex: 1; padding: 10px 4px 8px; text-align: center; cursor: pointer; border: none; background: none; color: var(--color-text-secondary); font-size: 10px; }
  .nav-item.active { color: #0F6E56; }
  .nav-icon { font-size: 20px; margin-bottom: 2px; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--color-text-secondary); font-size: 14px; }
</style>
</head>

function parseDate(str) {
  const y = str.includes('2024') ? 2024 : 2024;
  const parts = str.replace(/\s/g,'').split('.');
  if(parts.length < 2) return null;
  let m = parseInt(parts[1]), d = parseInt(parts[0]);
  if(isNaN(m)||isNaN(d)) return null;
  return new Date(2024, m-1, d);
}

const DAYS = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const MONTHS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

function fmtDate(d) {
  if(!d) return '';
  return `${DAYS[d.getDay()]}, ${d.getDate()}. ${MONTHS[d.getMonth()]}`;
}

let state = {};

async function loadState() {
  try {
    const r = await window.storage.get('training-state');
    if(r) state = JSON.parse(r.value);
  } catch(e) { state = {}; }
  renderAll();
}

async function saveState() {
  try { await window.storage.set('training-state', JSON.stringify(state)); } catch(e) {}
}

function getToday() {
  const now = new Date(); now.setHours(0,0,0,0); return now;
}

function findToday() {
  const t = getToday();
  let best = null, bestDiff = Infinity;
  trainings.forEach(tr => {
    if(!tr.dateObj) return;
    const diff = Math.abs(tr.dateObj - t);
    if(diff < bestDiff) { bestDiff = diff; best = tr; }
  });
  return best;
}

function daysUntilRace() {
  const t = getToday();
  const r = new Date(2024,7,30);
  return Math.ceil((r - t) / 86400000);
}

let currentPage = 'home';
let openPanel = null;
let panelNoteTimeout = null;

function showPage(page, el) {
  currentPage = page;
  document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
  document.getElementById('page-'+page).style.display = 'block';
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  if(page==='home') renderHome();
  if(page==='plan') renderPlan();
  if(page==='stats') renderStats();
}

function renderAll() {
  renderHome();
}

function renderHome() {
  const todayStr = fmtDate(getToday());

        <div class="countdown-suffix">Tage</div>
      </div>
    </div>`;

  if(todayT) {
    const done = s.done;

      <div class="today-training">${todayT.name}</div>

        <span class="badge badge-gray">${todayT.ern}</span>
      </div>
      <button class="done-btn ${done?'completed':''}" onclick="toggleDone('${todayT.id}')">
        <div class="check-icon ${done?'filled':''}">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        ${done ? 'Erledigt!' : 'Als erledigt markieren'}
      </button>
      <textarea class="notes-area" rows="3" placeholder="Notizen: Abweichungen, Befinden, Anmerkungen..." 
        oninput="updateNote('${todayT.id}', this.value)">${s.note||''}</textarea>
    </div>`;
  }
  
  document.getElementById('home-content').innerHTML = html;
}

function renderPlan() {
  let weeks = {};
  trainings.forEach(t => {
    if(!weeks[t.w]) weeks[t.w] = [];
    weeks[t.w].push(t);
  });
  
  let html = '';
  Object.keys(weeks).sort((a,b)=>a-b).forEach(w => {
    html += `<div class="week-header">Woche ${w}</div>`;
    weeks[w].forEach(t => {
      const s = state[t.id] || {};
      const isToday = t.dateObj && Math.abs(t.dateObj - getToday()) < 86400000;
      html += `<div class="training-item ${s.done?'completed':''} ${isToday?'today-item':''}" onclick="openDetail('${t.id}')">
        <div class="item-check">
          <div class="check-icon ${s.done?'filled':''}">
            <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
              <path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
        </div>
        <div class="item-body">
          <div class="item-date">${fmtDate(t.dateObj) || t.date} ${isToday?'· Heute':''}</div>
          <div class="item-name">${t.name}</div>
          <div class="item-focus">${t.focus} · ${t.ern}</div>
          ${s.note ? `<div class="item-note-gray">${s.note}</div>` : ''}
        </div>
      </div>`;
    });
  });
  
  document.getElementById('plan-content').innerHTML = html;
}

function renderStats() {
  const done = trainings.filter(t => state[t.id]?.done).length;
  const total = trainings.length;
  const pct = Math.round(done/total*100);
  const withNote = trainings.filter(t => state[t.id]?.note).length;
  
  let html = `
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num">${done}</div><div class="stat-label">Erledigt</div></div>
      <div class="stat-card"><div class="stat-num">${total-done}</div><div class="stat-label">Ausstehend</div></div>
    </div>
    <div class="stat-row">
      <div class="stat-card"><div class="stat-num">${pct}%</div><div class="stat-label">Fortschritt</div></div>
      <div class="stat-card"><div class="stat-num">${withNote}</div><div class="stat-label">Notizen</div></div>
    </div>
    <button class="export-btn" onclick="exportData()">↓ &nbsp;Protokoll exportieren (CSV)</button>
  `;
  
  document.getElementById('stats-content').innerHTML = html;
}

function toggleDone(id) {
  if(!state[id]) state[id] = {};
  state[id].done = !state[id].done;
  saveState();
  renderHome();
  if(currentPage==='plan') renderPlan();
  if(currentPage==='stats') renderStats();
}

function updateNote(id, val) {
  if(!state[id]) state[id] = {};
  state[id].note = val;
  clearTimeout(panelNoteTimeout);
  panelNoteTimeout = setTimeout(saveState, 800);
}

function openDetail(id) {
  openPanel = id;
  const t = trainings.find(x => x.id === id);
  const s = state[id] || {};
  document.getElementById('panel-content').innerHTML = `
    <div class="panel-date">${fmtDate(t.dateObj)||t.date} · Woche ${t.w}</div>
    <div class="panel-training">${t.name}</div>
    <div style="display:flex;gap:6px;margin:8px 0 12px;flex-wrap:wrap">
      <span class="badge">${t.focus}</span>
      <span class="badge badge-gray">${t.ern}</span>
    </div>
    <button class="done-btn ${s.done?'completed':''}" onclick="toggleDone('${id}');refreshPanel('${id}')">
      <div class="check-icon ${s.done?'filled':''}">
        <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
          <path d="M1 4l2.5 2.5L9 1" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      ${s.done ? 'Erledigt!' : 'Als erledigt markieren'}
    </button>
    <textarea class="notes-area" rows="3" placeholder="Notizen: Abweichungen, Befinden..." 
      oninput="updateNote('${id}', this.value)">${s.note||''}</textarea>
  `;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('detail-panel').classList.add('open');
}

function refreshPanel(id) {
  openDetail(id);
  if(currentPage==='plan') renderPlan();
}

function closePanel() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detail-panel').classList.remove('open');
  openPanel = null;
}

function exportData() {
  let csv = 'Woche,Datum,Training,Fokus,Ernaehrung,Erledigt,Notizen\n';
  trainings.forEach(t => {
    const s = state[t.id] || {};
    const note = (s.note||'').replace(/"/g,'""').replace(/\n/g,' ');
    const name = t.name.replace(/"/g,'""');
    csv += `${t.w},"${t.date}","${name}","${t.focus}","${t.ern}",${s.done?'Ja':'Nein'},"${note}"\n`;
  });
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'trainingsprotokoll.csv';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

document.getElementById('today-date').textContent = fmtDate(getToday());
loadState();
</script>
</body>
</html>
